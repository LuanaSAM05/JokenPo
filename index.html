<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>JokenPô PRO</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<!-- 🎥 VÍDEO DE FUNDO -->
<video autoplay muted loop id="bg-video">
  <source src="video/video-verde.mp4" type="video/mp4">
</video>

<div class="overlay"></div>

<div class="container">

  <h1>JokenPô</h1>
  <h2>🧠 VS 🤖</h2>

  <p class="subtitle">
    Escolha sua jogada e desafie a máquina! <br>
    Quem será o campeão?
  </p>

  <div class="battle">
    <div class="player">
      <h3>Você</h3>
      <div id="human-choice" class="choice">❔</div>
    </div>

    <div class="versus">VS</div>

    <div class="machine">
      <h3>Máquina</h3>
      <div id="machine-choice" class="choice">❔</div>
    </div>
  </div>

  <p id="result" class="result">Escolha sua jogada</p>

  <div class="buttons">
    <button data-choice="rock">✊</button>
    <button data-choice="paper">🤚</button>
    <button data-choice="scissors">✌️</button>
  </div>

  <div class="scoreboard">
    <p>Você: <span id="human-score">0</span></p>
    <p>Máquina: <span id="machine-score">0</span></p>
  </div>

</div>

<!-- 🎉 CONFETE -->
<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

<script src="script.js"></script>
</body>
</html>
